spring.application.name=assembly-vote
doc-application.description=Avaliacao tecnica SICRED
doc-application.version=v1

springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.path=swagger-ui.html

spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USER}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-description=true

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.port=${REDIS_PORT}
spring.cache.type=redis

application.session-duration-sec.default=${SESSION_DURATION}
scheduler.voting.close-delay=${SCHEDULER_VOTE}

feign.client.validate-member.url=${VALIDATE_MEMBER_URI}
feign.clients.default-logger-level=BASIC