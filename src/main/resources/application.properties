spring.application.name=assembly-vote
doc-application.description=Avaliacao tecnica SICRED
doc-application.version=v1

springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.path=swagger-ui.html

spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/assemblyvote
spring.datasource.username=appuser
spring.datasource.password=passwd
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-description=true